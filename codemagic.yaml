workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Fix Gradle wrapper
        script: |
          mkdir -p reels_counter/android/gradle/wrapper
          cat > reels_counter/android/gradle/wrapper/gradle-wrapper.properties << GRADLE
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GRADLE

      - name: Generate missing resource files
        script: |
          cd reels_counter
          flutter create --project-name reels_counter --org com.reelscounter . 2>/dev/null || true

      - name: Fix build.gradle
        script: |
          cat > reels_counter/android/app/build.gradle << 'BUILDGRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

          android {
              namespace "com.reelscounter.app"
              compileSdk 36
              ndkVersion flutter.ndkVersion

              compileOptions {
                  coreLibraryDesugaringEnabled true
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.reelscounter.app"
                  minSdkVersion 26
                  targetSdkVersion 36
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      shrinkResources true
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
              implementation "androidx.core:core-ktx:1.13.1"
          }
          BUILDGRADLE

      - name: Fix Dart bool error
        script: |
          sed -i '' 's/final hasVibrator = await Vibration.hasVibrator();/final hasVibrator = await Vibration.hasVibrator() ?? false;/' reels_counter/lib/services/alert_service.dart

      - name: Get Flutter packages
        script: cd reels_counter && flutter pub get

      - name: Build APK
        script: cd reels_counter && flutter build apk --release --android-skip-build-dependency-validation
    artifacts:
      - reels_counter/build/app/outputs/flutter-apk/app-release.apk
