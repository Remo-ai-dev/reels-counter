workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Fix build.gradle
        script: |
          cd reels_counter/android
          # Update gradle wrapper to supported version
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'GRADLE'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GRADLE
          # Fix shrinkResources issue in app/build.gradle
          sed -i 's/minifyEnabled false/minifyEnabled true/' app/build.gradle
      - name: Get Flutter packages
        script: cd reels_counter && flutter pub get
      - name: Build APK
        script: cd reels_counter && flutter build apk --release --android-skip-build-dependency-validation
    artifacts:
      - reels_counter/build/app/outputs/flutter-apk/app-release.apk
