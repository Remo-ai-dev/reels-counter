workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Fix Gradle wrapper
        script: |
          mkdir -p reels_counter/android/gradle/wrapper
          cat > reels_counter/android/gradle/wrapper/gradle-wrapper.properties << GRADLE
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GRADLE
      - name: Fix build.gradle
        script: |
          sed -i '' 's/minifyEnabled false/minifyEnabled true/' reels_counter/android/app/build.gradle
      - name: Get Flutter packages
        script: cd reels_counter && flutter pub get
      - name: Build APK
        script: cd reels_counter && flutter build apk --release --android-skip-build-dependency-validation
    artifacts:
      - reels_counter/build/app/outputs/flutter-apk/app-release.apk
